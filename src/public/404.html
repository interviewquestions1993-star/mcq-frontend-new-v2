<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - MCQ Exam & Interview Preparer</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to MCQ Exam & Interview Preparer for AI-powered quiz practice.">
  <meta name="robots" content="noindex, follow">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .error-container {
      max-width: 600px;
      padding: 40px 20px;
    }
    .error-code {
      font-size: 120px;
      font-weight: 800;
      margin: 0;
      line-height: 1;
      opacity: 0.9;
    }
    .error-title {
      font-size: 32px;
      font-weight: 700;
      margin: 20px 0;
    }
    .error-message {
      font-size: 18px;
      margin: 20px 0 40px;
      opacity: 0.9;
      line-height: 1.6;
    }
    .home-button {
      display: inline-block;
      background: white;
      color: #667eea;
      padding: 16px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    .home-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Page Not Found</h2>
    <p class="error-message">
      The page you're looking for doesn't exist or has been moved.
      Don't worry, let's get you back to practicing!
    </p>
    <a href="/" class="home-button">Go Home & Start Quiz</a>
  </div>
</body>
</html>
